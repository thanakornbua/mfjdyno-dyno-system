plugins {
    id 'application'
}

sourceCompatibility = 21
targetCompatibility = 21
mainClassName = 'com.dyno.fx.OperatorConsoleApp'

repositories {
    mavenCentral()
}

// ---- Architecture / platform detection ----------------------------------------

def osName  = System.getProperty('os.name').toLowerCase()
def osArch  = System.getProperty('os.arch').toLowerCase()
def isArm64 = osArch == 'aarch64' || osArch == 'arm64'

def gluonSdkDir = new File("${System.getProperty('user.home')}/javafx-21-aarch64/javafx-sdk-21.0.1/lib")
def useGluonSdk = isArm64 && gluonSdkDir.isDirectory() &&
        gluonSdkDir.listFiles()?.any { it.name.endsWith('.jar') }

def javafxPlatform
if (osName.contains('win')) {
    javafxPlatform = 'win'
} else if (osName.contains('mac')) {
    javafxPlatform = isArm64 ? 'mac-aarch64' : 'mac'
} else {
    javafxPlatform = isArm64 ? 'linux-aarch64' : 'linux'
}

// ---- Source sets --------------------------------------------------------------

sourceSets {
    thaiPdfHarness {
        java {
            srcDir 'harness/thai-pdf/src/main/java'
        }
        resources {
            srcDir 'harness/thai-pdf/src/main/resources'
        }
    }
}

// ---- Dependencies -------------------------------------------------------------

dependencies {
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.2'

    if (!useGluonSdk) {
        implementation 'org.openjfx:javafx-base:21.0.4'
        implementation "org.openjfx:javafx-base:21.0.4:${javafxPlatform}"
        implementation 'org.openjfx:javafx-graphics:21.0.4'
        implementation "org.openjfx:javafx-graphics:21.0.4:${javafxPlatform}"
        implementation 'org.openjfx:javafx-controls:21.0.4'
        implementation "org.openjfx:javafx-controls:21.0.4:${javafxPlatform}"
    } else {
        // Gluon SDK JARs must be on the compile classpath too
        implementation fileTree(dir: gluonSdkDir, include: '*.jar')
    }

    implementation 'com.itextpdf:kernel:7.2.5'
    implementation 'com.itextpdf:layout:7.2.5'
    implementation 'com.itextpdf:itext7-core:7.2.5'
    implementation 'org.apache.commons:commons-csv:1.10.0'

    thaiPdfHarnessImplementation 'com.github.librepdf:openpdf:2.0.3'
    thaiPdfHarnessImplementation 'com.itextpdf:kernel:7.2.5'
    thaiPdfHarnessImplementation 'com.itextpdf:layout:7.2.5'
    thaiPdfHarnessImplementation 'org.apache.pdfbox:pdfbox:3.0.3'
    testImplementation 'junit:junit:4.13.2'
}

// ---- JavaFX classpath split ---------------------------------------------------

def fxRuntimeClasspath = useGluonSdk
        ? fileTree(dir: gluonSdkDir, include: '*.jar')
        : files { sourceSets.main.runtimeClasspath.filter { f -> f.name.startsWith('javafx-') } }

def appRuntimeClasspath = useGluonSdk
        ? files { sourceSets.main.runtimeClasspath }
        : files { sourceSets.main.runtimeClasspath.filter { f -> !f.name.startsWith('javafx-') } }

def makeFxJvmArgs = { List<String> extra ->
    extra + ['--module-path', fxRuntimeClasspath.asPath, '--add-modules', 'javafx.controls']
}

def waylandEnv = { JavaExec t ->
    t.environment 'WAYLAND_DISPLAY', 'wayland-0'
    t.environment 'XDG_RUNTIME_DIR', '/run/user/1000'
}

// ---- Tasks --------------------------------------------------------------------

task runThaiPdfHarness(type: JavaExec) {
    group = 'application'
    description = 'Generate Thai PDF comparison output for Java PDF libraries.'
    dependsOn thaiPdfHarnessClasses
    classpath = sourceSets.thaiPdfHarness.runtimeClasspath
    main = 'com.dyno.harness.thaipdf.ThaiPdfHarness'
}

task runOperatorConsoleFx(type: JavaExec) {
    group = 'application'
    description = 'Run JavaFX operator console shell.'
    classpath = sourceSets.main.output + sourceSets.main.resources + appRuntimeClasspath
    main = 'com.dyno.fx.OperatorConsoleApp'
    jvmArgs = makeFxJvmArgs([])
    waylandEnv(delegate)
}

task runOperatorConsoleFxWindowed(type: JavaExec) {
    group = 'application'
    description = 'Run JavaFX operator console shell in windowed mode.'
    classpath = sourceSets.main.output + sourceSets.main.resources + appRuntimeClasspath
    main = 'com.dyno.fx.OperatorConsoleApp'
    jvmArgs = makeFxJvmArgs(['-DDYNO_UI_MODE=windowed'])
    waylandEnv(delegate)
}

task runOperatorConsoleFxFullscreen(type: JavaExec) {
    group = 'application'
    description = 'Run JavaFX operator console shell in fullscreen mode.'
    classpath = sourceSets.main.output + sourceSets.main.resources + appRuntimeClasspath
    main = 'com.dyno.fx.OperatorConsoleApp'
    jvmArgs = makeFxJvmArgs(['-DDYNO_UI_FULLSCREEN=true'])
    waylandEnv(delegate)
}

run {
    classpath = sourceSets.main.output + sourceSets.main.resources + appRuntimeClasspath
    main = 'com.dyno.fx.OperatorConsoleApp'
    jvmArgs = makeFxJvmArgs([])
    waylandEnv(delegate)
}

build.dependsOn thaiPdfHarnessClasses
jar {
    manifest {
        attributes 'Main-Class': mainClassName
    }
    from {
        configurations.runtimeClasspath.collect {
            it.isDirectory() ? it : zipTree(it)
        }
    }
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    exclude 'META-INF/*.SF'
    exclude 'META-INF/*.DSA'
    exclude 'META-INF/*.RSA'
    exclude 'META-INF/*.EC'
}
